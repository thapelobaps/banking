name: Wallet Snapshot Sync

on:
  push:
    branches:
      - agent/kape-phase-3-wallet-platform

permissions:
  contents: write

concurrency:
  group: wallet-snapshot-sync
  cancel-in-progress: false

jobs:
  sync-snapshot:
    if: ${{ !contains(github.event.head_commit.message, 'Sync EF wallet platform model snapshot') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__SqlServer: Server=localhost;Database=KapeSnapshotOnly;User Id=sa;Password=SnapshotOnlyPassword123!;TrustServerCertificate=True
      Jwt__SigningKey: snapshot-only-signing-key-with-more-than-thirty-two-characters

    steps:
      - name: Checkout phase branch
        uses: actions/checkout@v4
        with:
          ref: agent/kape-phase-3-wallet-platform
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef --version 10.0.9

      - name: Restore API
        run: dotnet restore backend/Kape.Api/Kape.Api.csproj

      - name: Build API
        run: dotnet build backend/Kape.Api/Kape.Api.csproj --configuration Release --no-restore

      - name: Generate exact model snapshot
        run: >-
          dotnet ef migrations add WalletPlatformSnapshotSyncTemp
          --project backend/Kape.Api/Kape.Api.csproj
          --startup-project backend/Kape.Api/Kape.Api.csproj
          --output-dir Migrations
          --configuration Release
          --no-build

      - name: Remove temporary no-apply migration files
        shell: bash
        run: |
          find backend/Kape.Api/Migrations -maxdepth 1 -type f \
            -name '*WalletPlatformSnapshotSyncTemp*.cs' \
            ! -name 'KapeDbContextModelSnapshot.cs' \
            -delete

      - name: Commit generated snapshot
        shell: bash
        run: |
          if git diff --quiet -- backend/Kape.Api/Migrations/KapeDbContextModelSnapshot.cs; then
            echo 'Snapshot already matches the current model.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/Kape.Api/Migrations/KapeDbContextModelSnapshot.cs
          git commit -m 'Sync EF wallet platform model snapshot [skip ci]'
          git push origin HEAD:agent/kape-phase-3-wallet-platform
