name: Kape CI

on:
  push:
    branches:
      - main
      - agent/kape-phase-1a
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: kape-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      KAPE_API_URL: http://localhost:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore backend/Kape.Api.Tests/Kape.Api.Tests.csproj

      - name: Build
        run: dotnet build backend/Kape.Api.Tests/Kape.Api.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: >-
          dotnet test backend/Kape.Api.Tests/Kape.Api.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=backend-tests.trx"
          --collect "XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/Kape.Api.Tests/TestResults/**/*.trx
            backend/Kape.Api.Tests/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
