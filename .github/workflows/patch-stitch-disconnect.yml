name: Patch Stitch disconnect cleanup

on:
  push:
    branches:
      - agent/kape-stitch-persistent-secrets

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[patched-stitch-disconnect]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/kape-stitch-persistent-secrets
          fetch-depth: 0

      - name: Patch provider cleanup call
        shell: python
        run: |
          from pathlib import Path

          path = Path('backend/Kape.Api/Services/WalletPlatformService.Banking.cs')
          content = path.read_text(encoding='utf-8')
          marker = '''        connection.IsDeleted = true;
          connection.Status = "disconnected";
          connection.UpdatedAt = DateTimeOffset.UtcNow;
          '''
          replacement = '''        await _bankProvider.DisconnectAsync(
              connection.ExternalConnectionId,
              cancellationToken);

          connection.IsDeleted = true;
          connection.Status = "disconnected";
          connection.UpdatedAt = DateTimeOffset.UtcNow;
          '''
          if replacement in content:
              raise SystemExit(0)
          if marker not in content:
              raise SystemExit('Expected disconnect marker was not found.')
          path.write_text(content.replace(marker, replacement, 1), encoding='utf-8')

      - name: Commit cleanup call
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/Kape.Api/Services/WalletPlatformService.Banking.cs
          git commit -m "Delete provider secrets when disconnecting [patched-stitch-disconnect]"
          git push origin HEAD:agent/kape-stitch-persistent-secrets
